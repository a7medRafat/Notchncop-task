name: tmdb_app
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  get_it: ^7.7.0
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.2
  go_router: ^14.2.7

  #environment_config:
  flutter_dotenv: ^5.2.0

  # UI
  flutter_screenutil: ^5.9.3
  shimmer: ^3.0.0

  # Network
  dio: ^5.7.0
  retrofit: ^4.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^6.1.4


  build_runner: ^2.4.12
  retrofit_generator: ^10.2.1

  # JSON code generation.
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  http_parser: ^4.0.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  retrofit_generator: ^10.2.1
  flutter_gen_runner: ^5.10.0
  flutter_lints: ^6.0.0



